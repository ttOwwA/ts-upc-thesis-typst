name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    env:
      TYPST_FONT_PATHS: ${{ github.workspace }}/fandol
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: 0.14.x

      - name: Install Fandol fonts
        run: |
          curl -fsSL -o fandol.zip https://mirrors.ctan.org/fonts/fandol.zip
          python3 -c "import zipfile; zipfile.ZipFile('fandol.zip').extractall('.')"
          rm -f fandol/FandolBraille-*.otf fandol/*-Bold.otf
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          sudo apt-get install -y fonts-fandol || true

      - name: Install Python & PyMuPDF
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pymupdf

      - name: Compile demo thesis
        run: |
          cd demo
          typst compile --root .. thesis-upc.typ thesis-upc.pdf

      - name: Generate thumbnail from demo PDF (page 1)
        run: |
          python -c "
          import fitz
          doc = fitz.open('demo/thesis-upc.pdf')
          page = doc[0]
          pix = page.get_pixmap(dpi=150)
          pix.save('thumbnail.png')
          print('thumbnail.png generated')
          "

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            demo/thesis-upc.pdf
            thumbnail.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
