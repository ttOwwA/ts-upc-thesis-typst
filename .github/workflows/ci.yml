name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build Demo & Template
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      TYPST_FONT_PATHS: ${{ github.workspace }}/fandol
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: ^0.14.0

      - name: Install Fandol fonts
        shell: bash
        run: |
          curl -fsSL -o fandol.zip https://mirrors.ctan.org/fonts/fandol.zip
          python3 -c "import zipfile; zipfile.ZipFile('fandol.zip').extractall('.')"
          rm -f fandol/FandolBraille-*.otf fandol/*-Bold.otf
          echo "Fandol fonts installed to ./fandol"
          ls -la fandol/

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          sudo apt-get install -y fonts-fandol || true

      - name: Install Python & PyMuPDF
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pymupdf

      - name: Compile demo thesis
        run: |
          cd demo
          typst compile --root .. thesis-upc.typ thesis-upc.pdf

      - name: Install package locally for template test
        run: bash scripts/package '@preview'
        shell: bash

      - name: Compile template
        run: |
          cd template
          typst compile thesis.typ thesis.pdf

      - name: Generate thumbnail from demo PDF (page 1)
        run: |
          python -c "
          import fitz
          doc = fitz.open('demo/thesis-upc.pdf')
          page = doc[0]
          pix = page.get_pixmap(dpi=150)
          pix.save('thumbnail.png')
          print('thumbnail.png generated')
          "

      - name: Upload demo PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-upc-pdf-${{ matrix.os }}
          path: demo/thesis-upc.pdf

      - name: Upload thumbnail artifact
        uses: actions/upload-artifact@v4
        with:
          name: thumbnail-png-${{ matrix.os }}
          path: thumbnail.png
